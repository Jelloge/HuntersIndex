<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COMP 4601 - Search Engine</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
    .header { background: #1a73e8; color: white; padding: 20px 0; text-align: center; }
    .header h1 { font-size: 1.8em; margin-bottom: 4px; }
    .header p { opacity: 0.85; font-size: 0.95em; }
    .container { max-width: 800px; margin: 0 auto; padding: 20px; }
    .search-box { background: white; border-radius: 8px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-top: -20px; position: relative; z-index: 1; }
    .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .search-row input[type="text"] { flex: 1; padding: 12px; font-size: 16px; border: 2px solid #ddd; border-radius: 6px; outline: none; }
    .search-row input[type="text"]:focus { border-color: #1a73e8; }
    .search-row button { padding: 12px 24px; background: #1a73e8; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
    .search-row button:hover { background: #1557b0; }
    .options { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
    .options label { font-size: 14px; color: #555; }
    .options select, .options input[type="number"] { padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
    .options select { min-width: 140px; }
    .options input[type="number"] { width: 70px; }
    .options .boost-label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .options .boost-label input { width: 18px; height: 18px; cursor: pointer; }
    .results { margin-top: 20px; }
    .results h2 { font-size: 1.1em; color: #666; margin-bottom: 12px; }
    .result-card { background: white; border-radius: 6px; padding: 16px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .result-card h3 { margin-bottom: 4px; }
    .result-card h3 a { color: #1a73e8; text-decoration: none; }
    .result-card h3 a:hover { text-decoration: underline; }
    .result-url { color: #0d7c2e; font-size: 0.85em; margin-bottom: 6px; word-break: break-all; }
    .result-meta { font-size: 0.85em; color: #666; display: flex; gap: 16px; flex-wrap: wrap; }
    .result-meta span { white-space: nowrap; }
    .result-meta a { color: #1a73e8; text-decoration: none; }
    .result-meta a:hover { text-decoration: underline; }
    .loading { text-align: center; padding: 40px; color: #888; display: none; }
    .no-results { text-align: center; padding: 40px; color: #888; }
    .rank-badge { display: inline-block; background: #e8eaed; color: #555; border-radius: 4px; padding: 2px 8px; font-size: 0.8em; margin-right: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>COMP 4601 Search Engine</h1>
    <p>TF-IDF + PageRank &bull; Assignment 1</p>
  </div>

  <div class="container">
    <div class="search-box">
      <div class="search-row">
        <input type="text" id="query" placeholder="Enter search query..." autofocus>
        <button onclick="doSearch()">Search</button>
      </div>
      <div class="options">
        <label>
          Dataset:
          <select id="dataset">
            <option value="fruitsA">fruitsA</option>
            <option value="personal">personal (Calamity Mod Wiki)</option>
          </select>
        </label>
        <label class="boost-label">
          <input type="checkbox" id="boost">
          Boost with PageRank
        </label>
        <label>
          Results:
          <input type="number" id="limit" value="10" min="1" max="50">
        </label>
      </div>
    </div>

    <div class="loading" id="loading">Searching...</div>
    <div class="results" id="results"></div>
  </div>

  <script>
    document.getElementById('query').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doSearch();
    });

    async function doSearch() {
      const q = document.getElementById('query').value.trim();
      const dataset = document.getElementById('dataset').value;
      const boost = document.getElementById('boost').checked;
      const limit = parseInt(document.getElementById('limit').value) || 10;

      if (!q) return;

      const resultsDiv = document.getElementById('results');
      const loadingDiv = document.getElementById('loading');

      resultsDiv.innerHTML = '';
      loadingDiv.style.display = 'block';

      try {
        const params = new URLSearchParams({ q, boost, limit });
        const res = await fetch(`/${dataset}?${params}`, {
          headers: { 'Accept': 'application/json' }
        });
        const data = await res.json();

        loadingDiv.style.display = 'none';

        if (!data.result || data.result.length === 0) {
          resultsDiv.innerHTML = '<div class="no-results">No results found.</div>';
          return;
        }

        const relevantCount = data.result.filter(r => r.score > 0).length;
        const header = relevantCount > 0
          ? `${data.result.length} results for "${escapeHtml(q)}" in ${dataset}${boost ? ' (boosted)' : ''}`
          : `No exact matches for "${escapeHtml(q)}" in ${dataset} — showing ${data.result.length} pages`;
        resultsDiv.innerHTML = `<h2>${header}</h2>`;

        data.result.forEach((r, i) => {
          const card = document.createElement('div');
          card.className = 'result-card';
          card.innerHTML = `
            <h3><span class="rank-badge">#${i + 1}</span><a href="${r.url}" target="_blank">${escapeHtml(r.title || r.url)}</a></h3>
            <div class="result-url">${escapeHtml(r.url)}</div>
            <div class="result-meta">
              <span>Score: ${r.score.toFixed(6)}</span>
              <span>PageRank: ${r.pr.toFixed(8)}</span>
              <a href="/${dataset}/page/${encodeURIComponent(r.url)}">View page data</a>
            </div>
          `;
          resultsDiv.appendChild(card);
        });
      } catch (err) {
        loadingDiv.style.display = 'none';
        resultsDiv.innerHTML = '<div class="no-results">Search failed. Please try again.</div>';
        console.error(err);
      }
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }
  </script>
</body>
</html>
